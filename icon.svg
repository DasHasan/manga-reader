<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a2e"/>

  <!-- Hat brim (wide ellipse) -->
  <ellipse cx="256" cy="300" rx="190" ry="38" fill="#f5c842" stroke="#c8960a" stroke-width="6"/>

  <!-- Hat crown -->
  <path d="M 130 300 Q 140 180 256 170 Q 372 180 382 300 Z" fill="#f5c842" stroke="#c8960a" stroke-width="6"/>

  <!-- Hat band (red) -->
  <path d="M 148 285 Q 200 270 256 268 Q 312 270 364 285 L 360 300 Q 308 286 256 284 Q 204 286 152 300 Z" fill="#e8162e"/>

  <!-- Brim underside shading -->
  <ellipse cx="256" cy="300" rx="190" ry="38" fill="none" stroke="#c8960a" stroke-width="6"/>

  <!-- Highlight on crown -->
  <path d="M 200 210 Q 230 195 256 192 Q 230 200 215 225 Z" fill="#fde98a" opacity="0.5"/>
</svg>
