<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>One Piece Manga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-screen.hidden {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #e74c3c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #888;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(56px + env(safe-area-inset-top, 0));
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            padding-top: env(safe-area-inset-top, 0);
            z-index: 100;
            will-change: transform, opacity;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 16px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
            z-index: 100;
            will-change: transform, opacity;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .controls.hidden {
            transform: translateY(100%);
            opacity: 0;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(40,40,40,0.95);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s ease;
            touch-action: manipulation;
        }

        .btn:active {
            background: rgba(70,70,70,0.95);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .btn-icon {
            padding: 12px;
            border-radius: 50%;
        }

        .btn-icon svg {
            width: 24px;
            height: 24px;
        }

        /* Chapter selector */
        .chapter-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .chapter-selector.active {
            display: flex;
        }

        .chapter-selector-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top, 0));
            border-bottom: 1px solid #222;
        }

        .chapter-selector-title {
            font-size: 20px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            line-height: 1;
            touch-action: manipulation;
        }

        /* Reader Container */
        .reader-container {
            width: 100%;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* Chapter Section */
        .chapter-section {
            width: 100%;
        }

        .chapter-header {
            text-align: center;
            padding: 20px 16px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
        }

        .chapter-label {
            font-size: 24px;
            font-weight: 700;
            color: #e74c3c;
        }

        .chapter-name {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        /* Page Image */
        .page-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            background: #0a0a0a;
            margin-bottom: 8px;
        }

        .page-image {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .page-image.loading {
            min-height: 300px;
            background: #111;
        }

        .page-error {
            width: 100%;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #666;
            font-size: 14px;
        }

        .page-error button {
            margin-top: 12px;
            padding: 8px 16px;
            background: #333;
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Chapter navigation */
        .chapter-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px 16px;
            border-top: 3px solid #e74c3c;
        }

        .next-chapter-btn,
        .prev-chapter-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s ease;
        }

        .next-chapter-btn {
            background: #e74c3c;
        }

        .next-chapter-btn:active {
            background: #c0392b;
        }

        .prev-chapter-btn {
            background: #2a2a2a;
        }

        .prev-chapter-btn:active {
            background: #3a3a3a;
        }

        .next-chapter-btn svg,
        .prev-chapter-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* Progress bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #e74c3c;
            z-index: 150;
            transition: width 0.1s linear;
        }

        /* Jump to chapter */
        .jump-input-container {
            display: flex;
            gap: 8px;
            padding: 16px;
        }

        .jump-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .jump-input:focus {
            border-color: #e74c3c;
        }

        .jump-btn {
            background: #e74c3c;
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* Landscape optimizations */
        @media (orientation: landscape) {
            .reader-container {
                padding-left: max(64px, env(safe-area-inset-left, 0));
                padding-right: max(64px, env(safe-area-inset-right, 0));
            }
        }

        /* Tablet and larger screens */
        @media (min-width: 768px) {
            .page-image {
                max-width: 800px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Wird geladen...</div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>

    <!-- Header -->
    <header class="header hidden" id="header">
        <div class="header-title" id="headerTitle">Kapitel –</div>
        <button class="btn btn-icon" id="btnChapters" title="Kapitel">
            <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
    </header>

    <!-- Reader Container -->
    <main class="reader-container" id="readerContainer">
        <!-- Pages will be dynamically inserted here -->
    </main>

    <!-- Controls -->
    <div class="controls hidden" id="controls">
        <div class="controls-row">
            <button class="btn btn-icon" id="btnFullscreen" title="Vollbild">
                <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
        </div>
    </div>

    <!-- Chapter Selector -->
    <div class="chapter-selector" id="chapterSelector">
        <div class="chapter-selector-header">
            <h2 class="chapter-selector-title">Kapitel auswählen</h2>
            <button class="close-btn" id="closeChapterSelector">&times;</button>
        </div>
        <div class="jump-input-container">
            <input type="number" inputmode="numeric" class="jump-input" id="jumpInput" placeholder="Kapitelnummer eingeben..." autocomplete="off" autocorrect="off" autocapitalize="off">
            <button class="jump-btn" id="jumpBtn">Los</button>
        </div>
    </div>

    <script>
        // Worker URL
        const WORKER_URL = 'https://manga-proxy.hasan-celik1501.workers.dev';

        const state = {
            currentChapter: null,
            latestChapter: null,
            minChapter: 1,
            isLoading: false,
            isFullscreen: false,
            uiVisible: false,
            currentVisiblePage: { chapter: null, page: null }
        };

        let pageObserver;

        // Fetch page URLs and chapter metadata from the worker
        async function fetchChapterData(chapter) {
            const response = await fetch(`${WORKER_URL}/chapter/${chapter}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data;
        }

        function updateLoadingText(text) {
            document.getElementById('loadingText').textContent = text;
        }

        function hideLoadingScreen() {
            document.getElementById('loadingScreen').classList.add('hidden');
        }

        function createPageElement(chapter, page, url, eager) {
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.dataset.chapter = chapter;
            wrapper.dataset.page = page;
            wrapper.dataset.url = url;

            const img = document.createElement('img');
            img.className = 'page-image loading';
            img.alt = `Kapitel ${chapter} – Seite ${page}`;
            img.loading = eager ? 'eager' : 'lazy';
            img.decoding = 'async';
            if (eager) img.setAttribute('fetchpriority', 'high');
            img.src = url;

            img.onload = function() { this.classList.remove('loading'); };
            img.onerror = function() {
                wrapper.innerHTML = `
                    <div class="page-error">
                        <span>Seite ${page} konnte nicht geladen werden</span>
                        <button onclick="retryLoadImage(this, ${chapter}, ${page})">Erneut versuchen</button>
                    </div>`;
            };

            wrapper.appendChild(img);
            if (pageObserver) pageObserver.observe(wrapper);
            return wrapper;
        }

        window.retryLoadImage = function(btn, chapter, page) {
            const wrapper = btn.closest('.page-wrapper');
            const url = wrapper.dataset.url;
            wrapper.replaceWith(createPageElement(chapter, page, url, false));
        };

        // Load a single chapter, replacing whatever is currently in the reader
        async function loadChapter(chapter) {
            if (state.isLoading) return;
            state.isLoading = true;

            updateLoadingText(`Kapitel ${chapter} wird geladen...`);
            document.getElementById('loadingScreen').classList.remove('hidden');

            let data;
            try {
                data = await fetchChapterData(chapter);
            } catch (err) {
                console.error('Chapter load failed:', err);
                // Leave the reader showing the previous chapter
                hideLoadingScreen();
                state.isLoading = false;
                return;
            }

            const pageUrls = data.chapter.pages.map(p => p.url);
            if (!pageUrls.length) {
                hideLoadingScreen();
                state.isLoading = false;
                return;
            }

            // Build the new chapter DOM before touching the container
            const section = document.createElement('div');
            section.className = 'chapter-section';
            section.id = `chapter-${chapter}`;
            section.dataset.chapter = chapter;

            const header = document.createElement('div');
            header.className = 'chapter-header';
            header.innerHTML = `
                <div class="chapter-label">Kapitel ${chapter}</div>
                ${data.chapter.name ? `<div class="chapter-name">${data.chapter.name}</div>` : ''}
            `;
            section.appendChild(header);

            for (let i = 0; i < pageUrls.length; i++) {
                section.appendChild(createPageElement(chapter, i + 1, pageUrls[i], i === 0));
            }

            // Navigation buttons
            const nav = document.createElement('div');
            nav.className = 'chapter-nav';
            nav.id = 'chapterNav';

            if (chapter > state.minChapter) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'prev-chapter-btn';
                prevBtn.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    <span>Vorheriges Kapitel (${chapter - 1})</span>
                `;
                prevBtn.addEventListener('click', () => loadChapter(chapter - 1));
                nav.appendChild(prevBtn);
            }

            if (state.latestChapter === null || chapter < state.latestChapter) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'next-chapter-btn';
                nextBtn.innerHTML = `
                    <span>Nächstes Kapitel (${chapter + 1})</span>
                    <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
                `;
                nextBtn.addEventListener('click', () => loadChapter(chapter + 1));
                nav.appendChild(nextBtn);
            }

            section.appendChild(nav);

            // Now swap out the old content
            const container = document.getElementById('readerContainer');
            container.innerHTML = '';
            container.appendChild(section);

            state.currentChapter = chapter;
            saveLastChapter(chapter);
            document.getElementById('headerTitle').textContent = `Kapitel ${chapter}`;

            // Scroll while the loading screen still covers the page so the jump is invisible.
            // Hit all three scroll roots — iOS A2H uses whichever one it feels like.
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;

            hideLoadingScreen();
            state.isLoading = false;

            // Belt-and-suspenders: iOS sometimes resets scroll after a layout pass.
            setTimeout(() => {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            }, 0);
        }

        // Called after background metadata arrives to trim nav buttons if needed
        function updateNavButtons() {
            if (state.currentChapter === null) return;
            const nav = document.getElementById('chapterNav');
            if (!nav) return;
            if (state.latestChapter !== null && state.currentChapter >= state.latestChapter) {
                nav.querySelector('.next-chapter-btn')?.remove();
            }
            if (state.currentChapter <= state.minChapter) {
                nav.querySelector('.prev-chapter-btn')?.remove();
            }
        }

        // Setup page observer for progress bar tracking
        function setupPageObserver() {
            pageObserver = new IntersectionObserver((entries) => {
                let mostVisible = null;
                let maxRatio = 0;
                entries.forEach(entry => {
                    if (entry.isIntersecting && entry.intersectionRatio > maxRatio) {
                        maxRatio = entry.intersectionRatio;
                        mostVisible = entry.target;
                    }
                });
                if (mostVisible) {
                    const chapter = parseInt(mostVisible.dataset.chapter);
                    const pageNum = parseInt(mostVisible.dataset.page);
                    if (state.currentVisiblePage.chapter !== chapter || state.currentVisiblePage.page !== pageNum) {
                        state.currentVisiblePage = { chapter, page: pageNum };
                        const totalPages = document.querySelectorAll(`.page-wrapper[data-chapter="${chapter}"]`).length;
                        document.getElementById('progressBar').style.width = `${(pageNum / totalPages) * 100}%`;
                    }
                }
            }, {
                root: null,
                rootMargin: '-40% 0px -40% 0px',
                threshold: [0, 0.5]
            });
        }

        // UI visibility toggle — ignores double-taps (used for native zoom)
        function setupUIToggle() {
            const reader = document.getElementById('readerContainer');
            let lastClickTime = 0;
            reader.addEventListener('click', (e) => {
                if (e.target.closest('button')) return;
                const now = Date.now();
                if (now - lastClickTime < 350) { lastClickTime = now; return; }
                lastClickTime = now;
                toggleUI();
            });
        }

        function toggleUI() {
            state.uiVisible = !state.uiVisible;
            document.getElementById('header').classList.toggle('hidden', !state.uiVisible);
            document.getElementById('controls').classList.toggle('hidden', !state.uiVisible);
        }

        // iOS Safari does not support the Fullscreen API on iPhone.
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const supportsFullscreen = !isIOS && (
            document.documentElement.requestFullscreen ||
            document.documentElement.webkitRequestFullscreen
        );

        function setupFullscreen() {
            const btn = document.getElementById('btnFullscreen');
            if (!supportsFullscreen) { btn.style.display = 'none'; return; }

            btn.addEventListener('click', toggleFullscreen);
            document.addEventListener('fullscreenchange', () => {
                state.isFullscreen = !!document.fullscreenElement;
                updateFullscreenButton();
            });
            document.addEventListener('webkitfullscreenchange', () => {
                state.isFullscreen = !!document.webkitFullscreenElement;
                updateFullscreenButton();
            });
        }

        function toggleFullscreen() {
            const elem = document.documentElement;
            if (!state.isFullscreen) {
                (elem.requestFullscreen || elem.webkitRequestFullscreen ||
                 elem.mozRequestFullScreen || elem.msRequestFullscreen).call(elem);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen ||
                 document.mozCancelFullScreen || document.msExitFullscreen).call(document);
            }
        }

        function updateFullscreenButton() {
            const btn = document.getElementById('btnFullscreen');
            btn.innerHTML = state.isFullscreen
                ? `<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>`
                : `<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>`;
        }

        function setupChapterSelector() {
            const btn = document.getElementById('btnChapters');
            const selector = document.getElementById('chapterSelector');
            const closeBtn = document.getElementById('closeChapterSelector');
            const jumpInput = document.getElementById('jumpInput');
            const jumpBtn = document.getElementById('jumpBtn');

            btn.addEventListener('click', () => {
                if (state.currentChapter) jumpInput.value = state.currentChapter;
                selector.classList.add('active');
            });
            closeBtn.addEventListener('click', () => selector.classList.remove('active'));

            function doJump() {
                const chapter = parseInt(jumpInput.value);
                if (chapter >= 1) {
                    selector.classList.remove('active');
                    jumpInput.value = '';
                    loadChapter(chapter);
                }
            }

            jumpBtn.addEventListener('click', doJump);
            jumpInput.addEventListener('keypress', e => { if (e.key === 'Enter') doJump(); });
        }

        function setupOrientationHandler() {
            function snapToCurrentPage() {
                setTimeout(() => {
                    const { chapter, page } = state.currentVisiblePage;
                    const el = document.querySelector(`.page-wrapper[data-chapter="${chapter}"][data-page="${page}"]`);
                    if (el) el.scrollIntoView({ behavior: 'instant', block: 'start' });
                }, 300);
            }
            if (screen.orientation) screen.orientation.addEventListener('change', snapToCurrentPage);
            window.addEventListener('orientationchange', snapToCurrentPage);
        }

        function saveLastChapter(chapter) {
            try { localStorage.setItem('lastChapter', chapter); } catch(e) {}
        }

        function loadLastChapter() {
            try { return parseInt(localStorage.getItem('lastChapter')) || null; } catch(e) { return null; }
        }

        // Fetch chapter list metadata (latestChapter, minChapter) in the background.
        // Non-critical — used to trim nav buttons and validate chapter ranges.
        async function fetchChapterMeta() {
            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();
                const entries = (data.entries || [])
                    .filter(e => e.is_available && e.lang === 'ger')
                    .sort((a, b) => b.number - a.number);
                if (entries.length) {
                    state.latestChapter = entries[0].number;
                    state.minChapter = entries[entries.length - 1].number;
                    updateNavButtons();
                }
            } catch (e) {
                // metadata is non-critical; nav buttons will still work, just without bounds checking
            }
        }

        async function init() {
            try {
                setupPageObserver();
                setupUIToggle();
                setupFullscreen();
                setupChapterSelector();
                setupOrientationHandler();

                const savedChapter = loadLastChapter();

                if (savedChapter) {
                    // Load saved chapter immediately; fetch metadata in background
                    fetchChapterMeta();
                    await loadChapter(savedChapter);
                } else {
                    // No saved chapter — need the latest chapter number first
                    updateLoadingText('Neuestes Kapitel wird ermittelt...');
                    await fetchChapterMeta();
                    await loadChapter(state.latestChapter || 1);
                }
            } catch (err) {
                console.error('Init failed:', err);
                updateLoadingText('Laden fehlgeschlagen. Bitte Seite neu laden.');
            }
        }

        init();
    </script>
</body>
</html>
